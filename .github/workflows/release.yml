name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          # GitHub-hosted Intel macOS runners (macos-13) are deprecated and
          # queue indefinitely, so cross-compile the x86_64 build on the arm64
          # runner (macOS ships a universal clang toolchain; ad-hoc signing is
          # arch-independent).
          - runner: macos-14
            target: x86_64-apple-darwin
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Download sidecar
        shell: bash
        run: ./scripts/download-sidecar.sh --target "${{ matrix.target }}"

      - name: Build and draft release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS bundles are ad-hoc signed (signingIdentity "-" in tauri.conf.json),
          # so they run after a one-time Gatekeeper "Open Anyway". To produce
          # notarized, friction-free macOS builds, add an Apple Developer account's
          # secrets below and set the signing identity to your "Developer ID
          # Application: …" (via APPLE_SIGNING_IDENTITY or tauri.conf.json), then
          # uncomment. tauri-action notarizes automatically when these are present.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
